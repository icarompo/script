<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Documentos PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #results {
            margin-top: 30px;
        }
        .decreto-item {
            background-color: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #4CAF50;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
        .progress {
            margin-top: 20px;
            padding: 10px;
            background-color: #e3f2fd;
            border-radius: 5px;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background-color: #f0f0f0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="number" id="numeroDoDocumento"/>
        <h1>📄 Leitor de Documentos PDF</h1>
        <p>Selecione os arquivos PDF de decretos para extrair as informações</p>
        <input type="file" id="pdfInput" accept=".pdf" multiple style="display: none;">
        <button onclick="document.getElementById('pdfInput').click()">Selecionar PDFs</button>
    </div>
    
    <div id="results"></div>

    <script>
        // Configurar o PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        document.getElementById('pdfInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Processando arquivos em paralelo...</div><div class="progress" id="progressContainer" style="display:none;"><div id="progressText"></div><div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div></div>';
            
            const totalFiles = files.length;
            let processedCount = 0;
            
            // Processar todos os arquivos em paralelo
            const decretos = await Promise.all(
                files.map(async (file) => {
                    try {
                        const decreto = await processarPDF(file);
                        processedCount++;
                        updateProgress(processedCount, totalFiles, `Processados: ${processedCount}/${totalFiles}`);
                        return decreto;
                    } catch (error) {
                        console.error(`Erro ao processar ${file.name}:`, error);
                        processedCount++;
                        updateProgress(processedCount, totalFiles, `Processados: ${processedCount}/${totalFiles}`);
                        return {
                            arquivo: file.name,
                            numeroDoDocumento: 'Erro no processamento',
                            data: 'Erro',
                            descricao: error.message,
                            erro: true
                        };
                    }
                })
            );
            
            // Filtrar valores nulos
            const decretosValidos = decretos.filter(d => d !== null);
            
            exibirResultados(decretosValidos);
            console.log('Decretos extraídos:', decretosValidos);
        });

        function updateProgress(current, total, message) {
            const progressContainer = document.getElementById('progressContainer');
            const progressText = document.getElementById('progressText');
            const progressFill = document.getElementById('progressFill');
            
            progressContainer.style.display = 'block';
            const percentage = Math.round((current / total) * 100);
            progressFill.style.width = percentage + '%';
            progressFill.textContent = percentage + '%';
            progressText.textContent = `${message} (${current}/${total})`;
        }

        async function processarPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            let textoCompleto = '';
            let usouOCR = false;
            
            // Ler todas as páginas
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                
                // Se a página tem pouco ou nenhum texto, usar OCR
                if (pageText.trim().length < 50) {
                    console.log(`Página ${i} de ${file.name} sem texto - usando OCR...`);
                    const ocrText = await extrairTextoComOCR(page);
                    textoCompleto += ocrText + ' ';
                } else {
                    textoCompleto += pageText + ' ';
                }
            }
            
            // Extrair informações usando regex
            const decreto = extrairInformacoes(textoCompleto, file.name);
            return decreto;
        }

        async function extrairTextoComOCR(page) {
            try {
                // Renderizar a página como imagem
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

                // Converter canvas para imagem e aplicar OCR
                const imageData = canvas.toDataURL('image/png');
                
                const result = await Tesseract.recognize(
                    imageData,
                    'por', // Português
                );

                return result.data.text;
            } catch (error) {
                console.error('Erro no OCR:', error);
                return '';
            }
        }

        function extrairInformacoesAta(texto, nomeArquivo) {
            // Extrair número da sessão - formatos: "Iº", "IIº", "1º", "2ª", etc.
            const regexNumeroAta = /ATA\s+DA?\s+([IVXivx]+|[\d]+)[ºª°]/i;
            const matchNumero = texto.match(regexNumeroAta);
            
            let numeroDoDocumento = null;
            if (matchNumero) {
                const numeroTexto = matchNumero[1];
                // Converter romano para número se necessário
                numeroDoDocumento = converterRomanoParaNumero(numeroTexto);
            }
            
            // Extrair data no formato "30.01.2025" ou "dd/mm/yyyy" ou "dd.mm.yyyy"
            const regexDataSimples = /(?:REALIZADA\s+EM\s+)?(\d{1,2})[\.\/](\d{1,2})[\.\/](\d{4})/i;
            const matchDataSimples = texto.match(regexDataSimples);
            
            let data = null;
            
            if (matchDataSimples) {
                const dia = parseInt(matchDataSimples[1]);
                const mes = parseInt(matchDataSimples[2]);
                const ano = parseInt(matchDataSimples[3]);
                
                // Converter para formato dd/mm/yyyy (formato brasileiro)
                data = `${dia.toString().padStart(2, '0')}/${mes.toString().padStart(2, '0')}/${ano}`;
            }
            
            // Extrair descrição até o primeiro ponto
            let descricao = '';
            const regexDescricao = /ATA\s+DA?\s+[^\.]+?\.([^\.]+?)\./i;
            const matchDescricao = texto.match(regexDescricao);
            
            if (matchDescricao) {
                descricao = matchDescricao[0].trim();
            } else {
                // Se não encontrou, pegar até o primeiro ponto depois de ATA
                const inicioAta = texto.search(/ATA\s+DA?\s+/i);
                if (inicioAta !== -1) {
                    const textoAposAta = texto.substring(inicioAta);
                    const primeiroPonto = textoAposAta.indexOf('.');
                    if (primeiroPonto !== -1) {
                        descricao = textoAposAta.substring(0, primeiroPonto + 1).trim();
                    }
                }
            }
            
            return {
                numero: document.getElementById('numeroDoDocumento').value,
                arquivo: nomeArquivo,
                numeroDoDocumento: numeroDoDocumento,
                data: data,
                letra: null,
                descricao: descricao.toUpperCase() || null,
                url: `https://api-riosono.barcodigital.com.br/arquivo/riosono.to.leg.br/documentos-site/${encodeURIComponent(nomeArquivo)}`,
                tipoDocumento: 'ATA'
            };
        }
        
        function converterRomanoParaNumero(romano) {
            // Se já for um número, retorna
            if (/^\d+$/.test(romano)) {
                return romano;
            }
            
            const romanos = {
                'I': 1, 'II': 2, 'III': 3, 'IV': 4, 'V': 5,
                'VI': 6, 'VII': 7, 'VIII': 8, 'IX': 9, 'X': 10,
                'XI': 11, 'XII': 12, 'XIII': 13, 'XIV': 14, 'XV': 15,
                'XVI': 16, 'XVII': 17, 'XVIII': 18, 'XIX': 19, 'XX': 20
            };
            
            return romanos[romano.toUpperCase()] || romano;
        }
        
        function converterDataParaExtenso(dia, mes, ano) {
            const unidades = ['', 'um', 'dois', 'três', 'quatro', 'cinco', 'seis', 'sete', 'oito', 'nove'];
            const dezenas = ['', 'dez', 'vinte', 'trinta', 'quarenta', 'cinquenta', 'sessenta', 'setenta', 'oitenta', 'noventa'];
            const especiais = ['dez', 'onze', 'doze', 'treze', 'quatorze', 'quinze', 'dezesseis', 'dezessete', 'dezoito', 'dezenove'];
            
            const mesesExtenso = [
                'janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho',
                'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'
            ];
            
            const milhares = ['', 'mil', 'dois mil', 'três mil', 'quatro mil', 'cinco mil'];
            
            // Converter dia para extenso
            let diaExtenso = '';
            if (dia >= 10 && dia <= 19) {
                diaExtenso = especiais[dia - 10];
            } else {
                const dezena = Math.floor(dia / 10);
                const unidade = dia % 10;
                if (dezena > 0 && unidade > 0) {
                    diaExtenso = dezenas[dezena] + ' e ' + unidades[unidade];
                } else if (dezena > 0) {
                    diaExtenso = dezenas[dezena];
                } else {
                    diaExtenso = unidades[unidade];
                }
            }
            
            // Converter ano para extenso
            const milhar = Math.floor(ano / 1000);
            const centena = Math.floor((ano % 1000) / 100);
            const dezenasAno = Math.floor((ano % 100) / 10);
            const unidadeAno = ano % 10;
            
            let anoExtenso = '';
            if (milhar === 2 && centena === 0) {
                anoExtenso = 'dois mil';
                if (dezenasAno >= 1 && dezenasAno <= 1 && unidadeAno >= 0) {
                    if (dezenasAno === 1 && unidadeAno > 0) {
                        anoExtenso += ' e ' + especiais[unidadeAno];
                    } else if (dezenasAno === 1 && unidadeAno === 0) {
                        anoExtenso += ' e dez';
                    } else if (dezenasAno > 1) {
                        anoExtenso += ' e ' + dezenas[dezenasAno];
                        if (unidadeAno > 0) {
                            anoExtenso += ' e ' + unidades[unidadeAno];
                        }
                    }
                } else if (dezenasAno >= 2) {
                    anoExtenso += ' e ' + dezenas[dezenasAno];
                    if (unidadeAno > 0) {
                        anoExtenso += ' e ' + unidades[unidadeAno];
                    }
                } else if (unidadeAno > 0) {
                    anoExtenso += ' e ' + unidades[unidadeAno];
                }
            }
            
            return `Aos ${diaExtenso} dias do mês de ${mesesExtenso[mes - 1]} de ${anoExtenso}`;
        }

        function extrairInformacoesProjetoLei(texto, nomeArquivo) {

            const matchDataExtenso = texto.match(regexDataExtenso);

                const ano = parseInt(matchDataExtenso[3]);
                
                // Converter para formato dd/mm/yyyy (formato brasileiro)
                data = `${dia.toString().padStart(2, '0')}/${mes}/${ano}`;
            }
            
            // Descrição - melhorada para capturar o conteúdo principal
            let descricao = '';
            
            // Procurar palavras-chave comuns em decretos
            const palavrasChave = [
                'dispõe sobre',
                'dispõe',
                'altera',
                'revoga',
                'autorizada',
                'estabelece',
                'institui',
                'regulamenta',
                'aprova',
                'autoriza',
                'nomeia',
                'exonera',
                'designa',
                'fixa',
                'cria',
                'extingue',
                'torna',
                'dispensa',
                'declara',
                'determina',
                'ementa'
            ];
            
            let inicioDescricao = -1;
            let palavraEncontrada = '';
            
            for (const palavra of palavrasChave) {
                const index = texto.toLowerCase().indexOf(palavra.toLowerCase());
                if (index !== -1 && (inicioDescricao === -1 || index < inicioDescricao)) {
                    inicioDescricao = index;
                    palavraEncontrada = palavra;
                }
            }
            
            if (inicioDescricao !== -1) {
                // Extrair do início da descrição
                let textoDescricao = texto.substring(inicioDescricao);
                
                // Limpar espaços extras e quebras de linha
                textoDescricao = textoDescricao.replace(/\s+/g, ' ').trim();
                
                // Procurar o fim da descrição (antes de "e dá outras providências" ou artigo 1)
                const marcadoresFim = [
                    ', e dá outras providências',
                    ' e dá outras providências',
                    'e dá outras providências',
                    ', e outras providências'
                ];
                
                let fimDescricao = textoDescricao.length;
                let marcadorUsado = '';
                
                for (const marcador of marcadoresFim) {
                    const index = textoDescricao.toLowerCase().indexOf(marcador.toLowerCase());
                    if (index !== -1 && index < fimDescricao) {
                        fimDescricao = index;
                        marcadorUsado = marcador;
                    }
                }
                
                // Se não encontrou nenhum marcador, pegar até o primeiro ponto seguido de maiúscula
                if (fimDescricao === textoDescricao.length) {
                    const matchPonto = textoDescricao.match(/\.\s+[A-Z]/);
                    if (matchPonto && matchPonto.index < 500) {
                        fimDescricao = matchPonto.index + 1;
                    }
                }
                
                descricao = textoDescricao.substring(0, fimDescricao).trim() + marcadorUsado;
                
                // Garantir que termina com pontuação
                if (descricao && !/[.!?,;]$/.test(descricao)) {
                    const ultimoPonto = Math.max(
                        descricao.lastIndexOf('.'),
                        descricao.lastIndexOf(','),
                        descricao.lastIndexOf(';')
                    );
                    if (ultimoPonto > 50) {
                        descricao = descricao.substring(0, ultimoPonto + 1);
                    } else {
                        descricao += '.';
                    }
                }
            }
            
            return {
                numero: document.getElementById('numeroDoDocumento').value,
                arquivo: nomeArquivo,
                numeroDoDocumento: numeroDoDocumento.includes('/') ? numeroDoDocumento.split('/')[0] : numerodoDocumento ? numeroDoDocumento : null ,
                data: data,

                tipoDocumento: 'PROJETO DE LEI'
            };
        }

            // Procurar palavras-chave comuns em portarias
            const palavrasChave = [
                'dispõe sobre',
                'dispõe',
                'altera',
                'revoga',
                'autorizada',
                'estabelece',
                'institui',
                'regulamenta',
                'aprova',
                'autoriza',
                'nomeia',
                'exonera',
                'designa',
                'fixa',
                'cria',
                'extingue',
                'torna',
                'dispensa',
                'declara',
                'determina',
                'ementa'
            ];
            
            let inicioDescricao = -1;
            let palavraEncontrada = '';
            
            for (const palavra of palavrasChave) {
                const index = texto.toLowerCase().indexOf(palavra.toLowerCase());
                if (index !== -1 && (inicioDescricao === -1 || index < inicioDescricao)) {
                    inicioDescricao = index;
                    palavraEncontrada = palavra;
                }
            }
            
            if (inicioDescricao !== -1) {
                // Extrair do início da descrição
                let textoDescricao = texto.substring(inicioDescricao);
                
                // Limpar espaços extras e quebras de linha
                textoDescricao = textoDescricao.replace(/\s+/g, ' ').trim();
                
                // Procurar o fim da descrição (antes de "e dá outras providências" ou artigo 1)
                const marcadoresFim = [
                    ', e dá outras providências',
                    ' e dá outras providências',
                    'e dá outras providências',
                    ', e outras providências'
                ];
                
                let fimDescricao = textoDescricao.length;
                let marcadorUsado = '';
                
                for (const marcador of marcadoresFim) {
                    const index = textoDescricao.toLowerCase().indexOf(marcador.toLowerCase());
                    if (index !== -1 && index < fimDescricao) {
                        fimDescricao = index;
                        marcadorUsado = marcador;
                    }
                }
                
                // Se não encontrou nenhum marcador, pegar até o primeiro ponto seguido de maiúscula
                if (fimDescricao === textoDescricao.length) {
                    const matchPonto = textoDescricao.match(/\.\s+[A-Z]/);
                    if (matchPonto && matchPonto.index < 500) {
                        fimDescricao = matchPonto.index + 1;
                    }
                }

                // Se não encontrou nenhum marcador, pegar até os 4 números seguidos de ponto
                if (fimDescricao === textoDescricao.length) {
                    const matchPonto = textoDescricao.match(/[0-9]{4}\./);
                    if (matchPonto && matchPonto.index < 500) {
                        fimDescricao = matchPonto.index + '.';
                    }
                }
                
                descricao = textoDescricao.substring(0, fimDescricao).trim() + marcadorUsado;
                
                // Garantir que termina com pontuação
                if (descricao && !/[.!?,;]$/.test(descricao)) {
                    const ultimoPonto = Math.max(
                        descricao.lastIndexOf('.'),

                }
            }
            
            return {

                tipoDocumento: 'PORTARIA'
            };
        }

        function extrairInformacoes(texto, nomeArquivo) {
            // Verificar se é uma ATA
            const isAta = /ATA\s+DA?\s+/i.test(texto);
            
            if (isAta) {
                return extrairInformacoesAta(texto, nomeArquivo);
            }
            
            // Verificar se é um PROJETO DE LEI
            const isProjetoLei = /PROJETO\s+DE\s+LEI/i.test(texto);
            
            if (isProjetoLei) {
                return extrairInformacoesProjetoLei(texto, nomeArquivo);
            }

            // Verificar se é PORTARIA
            const isPortaria = /PORTARIA\s+N["ºª°\s]+/i.test(texto);
            if (isPortaria) {
                return extrairInformacoesPortaria(texto, nomeArquivo);
            }

            // Verificar se é Lei
            const isLei = /LEI\s+N["ºª°\s]+/i.test(texto);
            if (isLei) {
                return extrairInformacoesLei(texto, nomeArquivo);
            }
            
            // Padrões para extrair informações de DECRETO
            
            // Número do decreto - diversos formatos possíveis
            const regexNumero = [
                /DECRETO(?:\s+N[ºª°]?)?\s*(\d+(?:[\.\/\-]\d+)*)(?:\-?([A-Z]))?\b/i
            ];
            
            let numeroDoDocumento = null;
            let letraDoDocumento = null;
            for (let regex of regexNumero) {
                const match = texto.match(regex);
                if (match) {
                    numeroDoDocumento = match[1];
                    if (match[2])
                        letraDoDocumento = match[2];
                    break;
                }
            }
            
            // Data - diversos formatos e conversão para formato brasileiro
            const regexData = [
                /(\d{1,2})\s+de\s+(\w+)\s+de\s+(\d{4})/i,
                /(\d{1,2})\/(\d{1,2})\/(\d{4})/,
                /(\d{4})-(\d{1,2})-(\d{1,2})/
            ];
            
            // Mapa de meses em português
            const meses = {
                'janeiro': '01', 'fevereiro': '02', 'março': '03', 'abril': '04',
                'maio': '05', 'junho': '06', 'julho': '07', 'agosto': '08',
                'setembro': '09', 'outubro': '10', 'novembro': '11', 'dezembro': '12'
            };
            
            let data = null;
            for (let regex of regexData) {
                const match = texto.match(regex);
                if (match) {
                    if (regex.toString().includes('de')) {
                        // Formato: "01 de janeiro de 2024" -> converter para dd/mm/yyyy
                        const dia = match[1].padStart(2, '0');
                        const mesNome = match[2].toLowerCase();
                        const mes = meses[mesNome] || '01';
                        const ano = match[3];
                        data = `${dia}/${mes}/${ano}`;
                    } else if (match[0].includes('/')) {
                        // Formato: "01/01/2024" - já está no formato brasileiro
                        const partes = match[0].split('/');
                        const dia = partes[0].padStart(2, '0');
                        const mes = partes[1].padStart(2, '0');
                        const ano = partes[2];
                        data = `${dia}/${mes}/${ano}`;
                    } else {
                        // Formato: "2024-01-01" -> converter para dd/mm/yyyy
                        const ano = match[1];
                        const mes = match[2].padStart(2, '0');
                        const dia = match[3].padStart(2, '0');
                        data = `${dia}/${mes}/${ano}`;
                    }
                    break;
                }
            }
            
            // Descrição - melhorada para capturar o conteúdo principal
            let descricao = '';
            
            // Procurar palavras-chave comuns em decretos
            const palavrasChave = [
                'dispõe sobre',
                'dispõe',
                'altera',
                'revoga',
                'autorizada',
                'estabelece',
                'institui',
                'regulamenta',
                'aprova',
                'autoriza',
                'nomeia',
                'exonera',
                'designa',
                'fixa',
                'cria',
                'extingue',
                'torna',
                'dispensa',
                'declara',
                'determina',
                'ementa'
            ];
            
            let inicioDescricao = -1;
            let palavraEncontrada = '';
            
            for (const palavra of palavrasChave) {
                const index = texto.toLowerCase().indexOf(palavra.toLowerCase());
                if (index !== -1 && (inicioDescricao === -1 || index < inicioDescricao)) {
                    inicioDescricao = index;
                    palavraEncontrada = palavra;
                }
            }
            
            if (inicioDescricao !== -1) {
                // Extrair do início da descrição
                let textoDescricao = texto.substring(inicioDescricao);
                
                // Limpar espaços extras e quebras de linha
                textoDescricao = textoDescricao.replace(/\s+/g, ' ').trim();
                
                // Procurar o fim da descrição (antes de "e dá outras providências" ou artigo 1)
                const marcadoresFim = [
                    ', e dá outras providências',
                    ' e dá outras providências',
                    'e dá outras providências',
                    ', e outras providências'
                ];
                
                let fimDescricao = textoDescricao.length;
                let marcadorUsado = '';
                
                for (const marcador of marcadoresFim) {
                    const index = textoDescricao.toLowerCase().indexOf(marcador.toLowerCase());
                    if (index !== -1 && index < fimDescricao) {
                        fimDescricao = index;
                        marcadorUsado = marcador;
                    }
                }
                
                // Se não encontrou nenhum marcador, pegar até o primeiro ponto seguido de maiúscula
                if (fimDescricao === textoDescricao.length) {
                    const matchPonto = textoDescricao.match(/\.\s+[A-Z]/);
                    if (matchPonto && matchPonto.index < 500) {
                        fimDescricao = matchPonto.index + 1;
                    }
                }
                
                descricao = textoDescricao.substring(0, fimDescricao).trim() + marcadorUsado;
                
                // Garantir que termina com pontuação
                if (descricao && !/[.!?,;]$/.test(descricao)) {
                    const ultimoPonto = Math.max(
                        descricao.lastIndexOf('.'),
                        descricao.lastIndexOf(','),
                        descricao.lastIndexOf(';')
                    );
                    if (ultimoPonto > 50) {
                        descricao = descricao.substring(0, ultimoPonto + 1);
                    } else {
                        descricao += '.';
                    }
                }
            }
            
            // Se não encontrou descrição, tentar pegar após o número do decreto
            if (!descricao && numeroDoDocumento) {
                const regexPosNumero = new RegExp(`decreto.*?${numeroDoDocumento}.*?([^\\n]{50,300})`, 'i');
                const matchPosNumero = texto.match(regexPosNumero);
                if (matchPosNumero) {
                    descricao = matchPosNumero[1].replace(/\s+/g, ' ').trim().substring(0, 200) + '...';
                }
            }
            
            return {
                numero: document.getElementById('numeroDoDocumento').value,
                arquivo: nomeArquivo,
                numeroDoDocumento: numeroDoDocumento.includes('/') ? numeroDoDocumento.split('/')[0] : numeroDoDocumento ? numeroDoDocumento : null,
                data: data || null,
                letra: letraDoDocumento || null,
                descricao: descricao.toUpperCase() || null,
                url: `https://api-riosono.barcodigital.com.br/arquivo/riosono.to.leg.br/documentos-site/${encodeURIComponent(nomeArquivo)}`
            };
        }

        function exibirResultados(decretos) {
            const resultsDiv = document.getElementById('results');
            
            if (decretos.length === 0) {
                resultsDiv.innerHTML = '<p>Nenhum ddocumento foi processado.</p>';
                return;
            }
            
            let html = '<h2>Documentos Extraídos (' + decretos.length + ')</h2>';
            
            decretos.forEach((decreto, index) => {
                const ocrBadge = decreto.usouOCR ? ' <span style="background-color: #ff9800; color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px;">OCR</span>' : '';
                const erroBadge = decreto.erro ? ' <span style="background-color: #f44336; color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px;">ERRO</span>' : '';
                
                html += `
                    <div class="documento-item">
                        <strong>Arquivo:</strong> ${decreto.arquivo}${ocrBadge}${erroBadge}<br>
                        <strong>Número do Documento:</strong> ${decreto.numeroDoDocumento}<br>
                        <strong>Data:</strong> ${decreto.data}<br>
                        <strong>Descrição:</strong> ${decreto.descricao}
                    </div>
                `;
            });

            const file = new Blob([JSON.stringify(decretos, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(file);
            a.download = 'decretos_extraidos.json';
            a.click();
            
            html += '<p style="margin-top: 20px;"><em>💡 Os resultados também foram impressos no console (F12)</em></p>';
            
            resultsDiv.innerHTML = html;
        }
