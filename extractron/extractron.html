<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EXTRACTRON - Extrator de Decretos PDF</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            max-width: 1200px;

            margin: 50px auto;

            padding: 20px;

        }

        .container {

            border: 2px dashed #ccc;

            padding: 30px;

            text-align: center;

            border-radius: 10px;

        }

        button {

            background-color: #4CAF50;

            color: white;

            padding: 15px 32px;

            font-size: 16px;

            border: none;

            border-radius: 5px;

            cursor: pointer;

        }

        button:hover {

            background-color: #45a049;

        }

        #results {

            margin-top: 30px;

        }

        .decreto-item {

            background-color: #f5f5f5;

            padding: 15px;

            margin: 10px 0;

            border-radius: 5px;

            border-left: 4px solid #4CAF50;

        }

        .loading {

            color: #666;

            font-style: italic;

        }

        .progress {

            margin-top: 20px;

            padding: 10px;

            background-color: #e3f2fd;

            border-radius: 5px;

        }

        .progress-bar {

            width: 100%;

            height: 30px;

            background-color: #f0f0f0;

            border-radius: 5px;

            overflow: hidden;

            margin-top: 10px;

        }

        .progress-fill {

            height: 100%;

            background-color: #4CAF50;

            transition: width 0.3s;

            display: flex;

            align-items: center;

            justify-content: center;

            color: white;

            font-weight: bold;

        }

    </style>

</head>

<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

    <div class="container">

        <h1>🔍 EXTRACTRON - Invasor de PDFs</h1>

        <p>Extrator automático de dados de decretos municipais</p>

        <input type="file" id="pdfInput" accept=".pdf" multiple style="display:none;">

        <button onclick="document.getElementById('pdfInput').click()">Selecionar PDFs</button>

    </div>

    

    <div id="results"></div>


    <script>

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';


        document.getElementById('pdfInput').addEventListener('change', async function(e) {

            const files = Array.from(e.target.files);

            const resultsDiv = document.getElementById('results');

            resultsDiv.innerHTML = '<div class="loading">Processando arquivos em paralelo...</div><div class="progress" id="progressContainer" style="display:none;"><div id="progressText"></div><div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div></div>';

            

            const totalFiles = files.length;

            let processedCount = 0;

            

            const decretos = await Promise.all(

                files.map(async (file) => {

                    try {

                        const decreto = await processarPDF(file);

                        processedCount++;

                        updateProgress(processedCount, totalFiles, `Processados: ${processedCount}/${totalFiles}`);

                        return decreto;

                    } catch (error) {

                        console.error(`Erro ao processar ${file.name}:`, error);

                        processedCount++;

                        updateProgress(processedCount, totalFiles, `Processados: ${processedCount}/${totalFiles}`);

                        return {

                            arquivo: file.name,

                            numeroDecreto: 'Erro no processamento',

                            data: 'Erro',

                            descricao: error.message,

                            erro: true

                        };

                    }

                })

            );

            

            const decretosValidos = decretos.filter(d => d !== null);

            exibirResultados(decretosValidos);

            console.log('Decretos extraídos:', decretosValidos);

        });


        function updateProgress(current, total, message) {

            const progressContainer = document.getElementById('progressContainer');

            const progressText = document.getElementById('progressText');

            const progressFill = document.getElementById('progressFill');

            

            progressContainer.style.display = 'block';

            const percentage = Math.round((current / total) * 100);

            progressFill.style.width = percentage + '%';

            progressFill.textContent = percentage + '%';

            progressText.textContent = `${message}`;

        }


        async function processarPDF(file) {

            const arrayBuffer = await file.arrayBuffer();

            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

            

            let textoCompleto = '';

            let usouOCR = false;

            

            for (let i = 1; i <= pdf.numPages; i++) {

                const page = await pdf.getPage(i);

                const textContent = await page.getTextContent();

                const pageText = textContent.items.map(item => item.str).join(' ');

                

                if (pageText.trim().length < 50) {

                    console.log(`Página ${i} de ${file.name} sem texto - usando OCR...`);

                    usouOCR = true;

                    const ocrText = await extrairTextoComOCR(page);

                    textoCompleto += ocrText + ' ';

                } else {

                    textoCompleto += pageText + ' ';

                }

            }

            

            const decreto = extrairInformacoes(textoCompleto, file.name);

            decreto.usouOCR = usouOCR;

            return decreto;

        }


        async function extrairTextoComOCR(page) {

            try {

                const viewport = page.getViewport({ scale: 2.0 });

                const canvas = document.createElement('canvas');

                const context = canvas.getContext('2d');

                canvas.height = viewport.height;

                canvas.width = viewport.width;


                await page.render({

                    canvasContext: context,

                    viewport: viewport

                }).promise;


                const imageData = canvas.toDataURL('image/png');

                

                const result = await Tesseract.recognize(imageData, 'por');

                return result.data.text;

            } catch (error) {

                console.error('Erro no OCR:', error);

                return '';

            }

        }


        function extrairInformacoes(texto, nomeArquivo) {

            let numeroDecreto = null;

            let letraDoDecreto = null;

            const regexNumero = /DECRETO(?:\s+N[ºª°]?)?\s*(\d+(?:[\.\/\-]\d+)*)(?:\-?([A-Z]))?\b/i;

            const match = texto.match(regexNumero);

            if (match) {

                numeroDecreto = match[1];

                if (match[2]) letraDoDecreto = match[2];

            }

            

            let data = null;

            const regexData = [

                /(\d{1,2})\s+de\s+(\w+)\s+de\s+(\d{4})/i,

                /(\d{1,2})\/(\d{1,2})\/(\d{4})/,

                /(\d{4})-(\d{1,2})-(\d{1,2})/

            ];

            

            const meses = {

                'janeiro': '01', 'fevereiro': '02', 'março': '03', 'abril': '04',

                'maio': '05', 'junho': '06', 'julho': '07', 'agosto': '08',

                'setembro': '09', 'outubro': '10', 'novembro': '11', 'dezembro': '12'

            };

            

            for (let regex of regexData) {

                const matchData = texto.match(regex);

                if (matchData) {

                    if (regex.toString().includes('de')) {

                        const dia = matchData[1].padStart(2, '0');

                        const mesNome = matchData[2].toLowerCase();

                        const mes = meses[mesNome] || '01';

                        const ano = matchData[3];

                        data = `${dia}/${mes}/${ano}`;

                    } else if (matchData[0].includes('/')) {

                        const partes = matchData[0].split('/');

                        const dia = partes[0].padStart(2, '0');

                        const mes = partes[1].padStart(2, '0');

                        const ano = partes[2];

                        data = `${dia}/${mes}/${ano}`;

                    } else {

                        const ano = matchData[1];

                        const mes = matchData[2].padStart(2, '0');

                        const dia = matchData[3].padStart(2, '0');

                        data = `${dia}/${mes}/${ano}`;

                    }

                    break;

                }

            }

            

            let descricao = '';

            const palavrasChave = [

                'dispõe sobre', 'dispõe', 'altera', 'revoga', 'autorizada',

                'estabelece', 'institui', 'regulamenta', 'aprova', 'autoriza',

                'nomeia', 'exonera', 'designa', 'fixa', 'cria', 'extingue',

                'torna', 'dispensa', 'declara', 'determina', 'ementa'

            ];

            

            let inicioDescricao = -1;

            for (const palavra of palavrasChave) {

                const index = texto.toLowerCase().indexOf(palavra.toLowerCase());

                if (index !== -1 && (inicioDescricao === -1 || index < inicioDescricao)) {

                    inicioDescricao = index;

                }

            }

            

            if (inicioDescricao !== -1) {

                let textoDescricao = texto.substring(inicioDescricao);

                textoDescricao = textoDescricao.replace(/\s+/g, ' ').trim();

                

                const marcadoresFim = [', e dá outras providências', ' e dá outras providências', 'e dá outras providências'];

                let fimDescricao = textoDescricao.length;

                

                for (const marcador of marcadoresFim) {

                    const index = textoDescricao.toLowerCase().indexOf(marcador.toLowerCase());

                    if (index !== -1 && index < fimDescricao) {

                        fimDescricao = index;

                    }

                }

                

                if (fimDescricao === textoDescricao.length) {

                    const matchPonto = textoDescricao.match(/\.\s+[A-Z]/);

                    if (matchPonto && matchPonto.index < 500) {

                        fimDescricao = matchPonto.index + 1;

                    }

                }

                

                descricao = textoDescricao.substring(0, fimDescricao).trim();

                

                if (descricao && !/[.!?,;]$/.test(descricao)) {

                    descricao += '.';

                }

            }

            

            return {

                arquivo: nomeArquivo,

                numeroDecreto: numeroDecreto && numeroDecreto.includes('/') ? numeroDecreto.split('/')[0] : numeroDecreto || null,

                data: data || null,

                letra: letraDoDecreto || null,

                descricao: descricao.toUpperCase() || null,

                url: `https://api-riosono.barcodigital.com.br/arquivo/riosono.to.leg.br/documentos-site/${encodeURIComponent(nomeArquivo)}`

            };

        }


        function exibirResultados(decretos) {

            const resultsDiv = document.getElementById('results');

            

            if (decretos.length === 0) {

                resultsDiv.innerHTML = '<p>Nenhum decreto foi processado.</p>';

                return;

            }

            

            let html = '<h2>Decretos Extraídos (' + decretos.length + ')</h2>';

            

            decretos.forEach((decreto) => {

                const ocrBadge = decreto.usouOCR ? ' <span style="background-color: #ff9800; color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px;">OCR</span>' : '';

                const erroBadge = decreto.erro ? ' <span style="background-color: #f44336; color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px;">ERRO</span>' : '';

                

                html += `<div class="decreto-item">

                    <strong>Arquivo:</strong> ${decreto.arquivo}${ocrBadge}${erroBadge}<br>

                    <strong>Número:</strong> ${decreto.numeroDecreto}<br>

                    <strong>Data:</strong> ${decreto.data}<br>

                    <strong>Descrição:</strong> ${decreto.descricao}

                </div>`;

            });


            const file = new Blob([JSON.stringify(decretos, null, 2)], { type: 'application/json' });

            const a = document.createElement('a');

            a.href = URL.createObjectURL(file);

            a.download = 'decretos_extraidos.json';

            a.click();

            

            html += '<p style="margin-top: 20px;"><em>💡 JSON exportado: decretos_extraidos.json</em></p>';

            resultsDiv.innerHTML = html;

        }

    </script>

</body>

</html>
